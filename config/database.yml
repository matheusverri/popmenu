default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "db") %>
  username: <%= ENV.fetch("DATABASE_USER", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "popmenu_development") %>

test:
  <<: *default
  database: popmenu_test

production:
  <<: *default
  database: popmenu_production
  username: popmenu
  password: <%= ENV["POPMENU_DATABASE_PASSWORD"] %>